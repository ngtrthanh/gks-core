<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GKS Core — Kernel Console</title>
<style>
/* ---------------------------------------------------------------- tokens */
:root{
  --paper:#f4f4f0;         /* room */
  --panel:#fdfdfa;         /* ledger sheet */
  --panel-2:#efeeea;       /* recessed wells */
  --ink:#1b1f1c;
  --ink-2:#5c6058;
  --ink-3:#8a8d84;
  --hairline:#dddcd2;
  --seal:#9c3126;          /* the seal — used sparingly */
  --seal-ink:#ffffff;
  --focus:#2a78d6;
  /* constructors — validated categorical slots 1–6 (light) */
  --c-NRM:#2a78d6; --c-CLS:#1baf7a; --c-PWR:#eda100;
  --c-GRD:#008300; --c-REF:#4a3aa7; --c-VAL:#e34948;
  /* verdict status — reserved, never reused as series */
  --s-compliant:#1a7f37; --s-violated:#c93c37; --s-conditional:#9a6b00;
  --s-inapplicable:#6b6a66; --s-defeated:#7a4fc9;
  --radius:6px;
  --serif:"Iowan Old Style","Palatino Linotype","Book Antiqua",Palatino,Georgia,serif;
  --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  --mono:ui-monospace,"SF Mono","Cascadia Code",Menlo,Consolas,monospace;
}
@media (prefers-color-scheme: dark){
  :root{
    --paper:#171814; --panel:#1e1f1b; --panel-2:#262722;
    --ink:#eceade; --ink-2:#aeb0a3; --ink-3:#7d7f74;
    --hairline:#34352e;
    --seal:#d96b5c; --seal-ink:#1b130f;
    --c-NRM:#3987e5; --c-CLS:#199e70; --c-PWR:#c98500;
    --c-GRD:#4c9d3f; --c-REF:#9085e9; --c-VAL:#e66767;
    --s-compliant:#4bab60; --s-violated:#e66767; --s-conditional:#d9a03c;
    --s-inapplicable:#8f9186; --s-defeated:#a98ee6;
  }
}
/* ---------------------------------------------------------------- base */
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--paper); color:var(--ink);
  font:14px/1.55 var(--sans);
  -webkit-font-smoothing:antialiased;
}
:focus-visible{outline:2px solid var(--focus); outline-offset:2px; border-radius:3px}
button{font:inherit; color:inherit; background:none; border:none; cursor:pointer; padding:0}
a{color:inherit}
.mono{font-family:var(--mono)}
.muted{color:var(--ink-2)}
/* ---------------------------------------------------------------- header */
header{
  border-bottom:1px solid var(--hairline);
  background:var(--panel);
  position:sticky; top:0; z-index:20;
}
.masthead{
  max-width:1240px; margin:0 auto; padding:14px 24px 10px;
  display:flex; align-items:baseline; gap:28px; flex-wrap:wrap;
}
.wordmark{font-family:var(--serif); font-size:21px; letter-spacing:.01em; white-space:nowrap}
.wordmark b{font-weight:700}
.wordmark .sep{color:var(--seal); padding:0 2px}
.wordmark small{
  font-family:var(--sans); font-size:10px; font-weight:600; color:var(--ink-2);
  text-transform:uppercase; letter-spacing:.14em; margin-left:10px;
}
/* -- the temporal cursor: every read happens AT these coordinates -------- */
.cursor{margin-left:auto; display:flex; align-items:center; gap:10px}
.cursor-face{
  display:flex; align-items:baseline; gap:6px;
  font-family:var(--serif); font-size:17px;
  padding:4px 10px; border:1px solid var(--hairline); border-radius:var(--radius);
  background:var(--panel-2);
}
.cursor-face:hover{border-color:var(--ink-3)}
.cursor-face .ang{color:var(--seal); font-size:20px; line-height:1}
.cursor-face .dim{font-family:var(--sans); font-size:9px; font-weight:700;
  letter-spacing:.12em; text-transform:uppercase; color:var(--ink-2); align-self:center}
.cursor-face .val{font-family:var(--mono); font-size:12.5px}
.cursor-face .dot{color:var(--ink-3)}
.cursor-pop{
  position:absolute; right:24px; top:56px; z-index:30;
  background:var(--panel); border:1px solid var(--hairline); border-radius:var(--radius);
  box-shadow:0 12px 32px rgba(0,0,0,.14);
  padding:16px; width:320px; display:none;
}
.cursor-pop.open{display:block}
.cursor-pop label{display:block; font-size:10px; font-weight:700; letter-spacing:.12em;
  text-transform:uppercase; color:var(--ink-2); margin:10px 0 4px}
.cursor-pop label:first-child{margin-top:0}
.cursor-pop input{
  width:100%; font:12.5px var(--mono); color:var(--ink);
  background:var(--panel-2); border:1px solid var(--hairline); border-radius:4px; padding:7px 8px;
}
.cursor-pop .row{display:flex; gap:8px; margin-top:14px}
.btn{
  font-size:12.5px; font-weight:600; padding:7px 14px; border-radius:var(--radius);
  border:1px solid var(--hairline); background:var(--panel-2);
}
.btn:hover{border-color:var(--ink-3)}
.btn.primary{background:var(--seal); color:var(--seal-ink); border-color:var(--seal)}
.btn.primary:hover{filter:brightness(1.08)}
/* -- as-read ribbon + tabs ------------------------------------------------ */
.ribbon{
  max-width:1240px; margin:0 auto; padding:0 24px 10px;
  display:flex; align-items:center; gap:20px;
}
nav{display:flex; gap:2px}
nav button{
  font-size:12.5px; font-weight:600; padding:6px 12px; border-radius:var(--radius);
  color:var(--ink-2);
}
nav button:hover{color:var(--ink)}
nav button[aria-current="true"]{background:var(--panel-2); color:var(--ink)}
.asread{margin-left:auto; font-size:11px; color:var(--ink-3)}
.asread .mono{color:var(--ink-2)}
/* ---------------------------------------------------------------- layout */
main{max-width:1240px; margin:0 auto; padding:20px 24px 60px}
.view{display:none}
.view.active{display:block}
/* -- census: six constructor tiles = stats + filter + legend ------------- */
.census{display:grid; grid-template-columns:repeat(6,1fr); gap:10px; margin-bottom:14px}
@media (max-width:900px){.census{grid-template-columns:repeat(3,1fr)}}
@media (max-width:560px){.census{grid-template-columns:repeat(2,1fr)}}
.tile{
  text-align:left; background:var(--panel); border:1px solid var(--hairline);
  border-radius:var(--radius); padding:10px 12px 9px; position:relative;
}
.tile:hover{border-color:var(--ink-3)}
.tile[aria-pressed="true"]{border-color:var(--tc); box-shadow:inset 0 0 0 1px var(--tc)}
.tile .code{display:flex; align-items:center; gap:7px; font:700 12px var(--mono)}
.tile .swatch{width:9px; height:9px; border-radius:2px; background:var(--tc)}
.tile .n{font-family:var(--serif); font-size:22px; margin-top:2px}
.tile .role{font-size:10.5px; color:var(--ink-2); line-height:1.35; margin-top:1px}
/* distribution bar: thin stacked, 2px gaps, tiles are the legend */
.dist{display:flex; height:8px; border-radius:4px; overflow:hidden; gap:2px;
  background:var(--paper); margin:2px 0 22px}
.dist span{background:var(--dc); min-width:3px}
.dist span:first-child{border-radius:4px 0 0 4px}
.dist span:last-child{border-radius:0 4px 4px 0}
/* -- toolbar -------------------------------------------------------------- */
.toolbar{display:flex; align-items:center; gap:12px; margin-bottom:12px; flex-wrap:wrap}
.search{
  flex:1; min-width:220px; max-width:420px;
  font:13px var(--sans); color:var(--ink);
  background:var(--panel); border:1px solid var(--hairline); border-radius:var(--radius);
  padding:8px 12px;
}
.search::placeholder{color:var(--ink-3)}
.count{font-size:12px; color:var(--ink-2)}
.pager{margin-left:auto; display:flex; gap:6px; align-items:center; font-size:12px; color:var(--ink-2)}
/* -- ledger table ---------------------------------------------------------- */
.sheet{background:var(--panel); border:1px solid var(--hairline); border-radius:var(--radius); overflow:hidden}
.scroll{overflow-x:auto}
table{border-collapse:collapse; width:100%; min-width:760px}
th{
  font-size:10px; font-weight:700; letter-spacing:.12em; text-transform:uppercase;
  color:var(--ink-2); text-align:left; padding:9px 14px;
  border-bottom:1px solid var(--hairline); background:var(--panel);
}
td{padding:9px 14px; border-bottom:1px solid var(--hairline); vertical-align:top}
tbody tr:last-child td{border-bottom:none}
tbody tr{cursor:pointer}
tbody tr:hover td{background:var(--panel-2)}
td.locus{font-family:var(--serif); font-size:13.5px; white-space:nowrap; max-width:300px;
  overflow:hidden; text-overflow:ellipsis}
td.range{font-family:var(--mono); font-size:11px; color:var(--ink-2); white-space:nowrap}
.badge{
  display:inline-flex; align-items:center; gap:5px;
  font:700 10.5px var(--mono); letter-spacing:.04em;
  padding:2px 7px; border-radius:10px;
  background:color-mix(in srgb, var(--bc) 13%, transparent);
  color:var(--bc);
}
.badge i{width:6px;height:6px;border-radius:50%;background:var(--bc)}
.sum{font-size:12.5px; max-width:460px}
.sum .k{font-family:var(--mono); font-size:11.5px}
.ot{
  display:inline-block; font:600 10.5px var(--mono);
  background:color-mix(in srgb, var(--s-conditional) 15%, transparent);
  color:var(--s-conditional);
  border:1px dashed var(--s-conditional);
  border-radius:4px; padding:0 5px;
}
/* -- verdict chips ---------------------------------------------------------- */
.chip{
  display:inline-flex; align-items:center; gap:6px;
  font-size:11.5px; font-weight:700; padding:2px 9px; border-radius:10px;
  background:color-mix(in srgb, var(--vc) 13%, transparent); color:var(--vc);
}
.chip i{width:7px;height:7px;border-radius:50%;background:var(--vc)}
/* -- impact ----------------------------------------------------------------- */
.impact-form{display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap}
.impact-form input{flex:1; min-width:260px}
.depth-group{margin-bottom:18px}
.depth-label{
  font-size:10px; font-weight:700; letter-spacing:.12em; text-transform:uppercase;
  color:var(--ink-2); margin-bottom:6px; display:flex; align-items:center; gap:8px;
}
.depth-label:before{content:""; width:18px; height:1px; background:var(--seal)}
.iri-item{
  font:12.5px var(--mono); background:var(--panel); border:1px solid var(--hairline);
  border-radius:4px; padding:6px 10px; margin-bottom:6px; word-break:break-all;
}
/* -- detail slide-over ------------------------------------------------------- */
.overlay{position:fixed; inset:0; background:rgba(20,20,16,.32); z-index:40; display:none}
.overlay.open{display:block}
.drawer{
  position:fixed; top:0; right:0; bottom:0; width:min(560px,94vw); z-index:50;
  background:var(--panel); border-left:1px solid var(--hairline);
  transform:translateX(102%); transition:transform .22s ease;
  display:flex; flex-direction:column;
}
@media (prefers-reduced-motion: reduce){.drawer{transition:none}}
.drawer.open{transform:none}
.drawer-head{padding:18px 22px 14px; border-bottom:1px solid var(--hairline)}
.drawer-head .top{display:flex; align-items:center; gap:10px}
.drawer-head .close{margin-left:auto; font-size:20px; color:var(--ink-2); padding:2px 8px}
.drawer-head .close:hover{color:var(--ink)}
.drawer-head h2{font-family:var(--serif); font-size:18px; font-weight:600; margin:8px 0 2px}
.drawer-head .id{font:11px var(--mono); color:var(--ink-3); word-break:break-all}
.drawer-body{overflow-y:auto; padding:18px 22px 40px; flex:1}
.sect{margin-bottom:22px}
.sect h3{
  font-size:10px; font-weight:700; letter-spacing:.12em; text-transform:uppercase;
  color:var(--ink-2); margin:0 0 8px; display:flex; align-items:center; gap:8px;
}
.sect h3:before{content:""; width:18px; height:1px; background:var(--seal)}
.formula{
  font:13px/1.7 var(--mono); background:var(--panel-2);
  border:1px solid var(--hairline); border-radius:var(--radius);
  padding:12px 14px; overflow-x:auto;
}
.formula .op{color:var(--seal); font-weight:600}
.formula .fn{color:var(--c-REF)}
.formula .lit{color:var(--c-GRD)}
.formula .vr{font-style:italic}
.kv{display:grid; grid-template-columns:auto 1fr; gap:4px 16px; font-size:12.5px}
.kv dt{color:var(--ink-2); font-size:11px; padding-top:1px; white-space:nowrap}
.kv dd{margin:0; word-break:break-word}
.slice{
  border:1px solid var(--hairline); border-radius:var(--radius);
  padding:10px 12px; margin-bottom:8px; background:var(--panel);
}
.slice .coords{font:11px var(--mono); color:var(--ink-2)}
.slice .coords b{color:var(--ink); font-weight:600}
details.raw summary{font-size:11.5px; color:var(--ink-2); cursor:pointer}
details.raw pre{
  font:11px/1.5 var(--mono); background:var(--panel-2); border-radius:4px;
  padding:10px; overflow-x:auto; margin:8px 0 0;
}
/* -- empty / notes ------------------------------------------------------------ */
.empty{
  text-align:center; padding:48px 20px; color:var(--ink-2); font-size:13px;
  background:var(--panel); border:1px dashed var(--hairline); border-radius:var(--radius);
}
.empty b{font-family:var(--serif); font-size:15px; display:block; margin-bottom:4px; color:var(--ink)}
footer{
  max-width:1240px; margin:0 auto; padding:0 24px 28px;
  font-size:11px; color:var(--ink-3);
}
footer .mono{font-size:10.5px}
</style>
</head>
<body>

<header>
  <div class="masthead">
    <div class="wordmark"><b>GKS</b><span class="sep">·</span>CORE<small>Kernel Console</small></div>
    <div class="cursor">
      <button class="cursor-face" id="cursorFace" aria-haspopup="true" aria-expanded="false"
              title="Change the bitemporal read coordinates">
        <span class="ang">⟨</span>
        <span class="dim">t_text</span><span class="val" id="ttFace">now</span>
        <span class="dot">·</span>
        <span class="dim">t_fact</span><span class="val" id="tfFace">now</span>
        <span class="ang">⟩</span>
      </button>
    </div>
  </div>
  <div class="cursor-pop" id="cursorPop" role="dialog" aria-label="Read coordinates">
    <label for="ttIn">t_text — validity in text</label>
    <input id="ttIn" type="datetime-local" step="1">
    <label for="tfIn">t_fact — validity in fact</label>
    <input id="tfIn" type="datetime-local" step="1">
    <div class="row">
      <button class="btn primary" id="applyCoords">Read at coordinates</button>
      <button class="btn" id="resetCoords">Now</button>
    </div>
  </div>
  <div class="ribbon">
    <nav aria-label="Views">
      <button data-view="ledger" aria-current="true">Ledger</button>
      <button data-view="verdicts" aria-current="false">Verdicts</button>
      <button data-view="impact" aria-current="false">Impact</button>
    </nav>
    <div class="asread" id="asread"></div>
  </div>
</header>

<main>
  <!-- ============================================================ LEDGER -->
  <section class="view active" id="view-ledger">
    <div class="census" id="census" role="group" aria-label="Constructors — click to filter"></div>
    <div class="dist" id="dist" aria-hidden="true"></div>

    <div class="toolbar">
      <input class="search" id="q" type="search"
             placeholder="Search locus or payload — e.g. Điều 100, nghỉ hằng năm, wage…"
             aria-label="Search instances">
      <span class="count" id="ledgerCount"></span>
      <span class="pager">
        <button class="btn" id="prevPage" aria-label="Previous page">‹</button>
        <span id="pageInfo"></span>
        <button class="btn" id="nextPage" aria-label="Next page">›</button>
      </span>
    </div>

    <div class="sheet"><div class="scroll">
      <table aria-label="Kernel instances valid at the read coordinates">
        <thead><tr>
          <th>Locus</th><th>Constructor</th><th>Reading</th><th>t_text</th><th>t_fact</th>
        </tr></thead>
        <tbody id="ledgerBody"></tbody>
      </table>
    </div></div>
    <div id="ledgerEmpty"></div>
  </section>

  <!-- ============================================================ VERDICTS -->
  <section class="view" id="view-verdicts">
    <div class="sheet"><div class="scroll">
      <table aria-label="Persisted verdicts">
        <thead><tr>
          <th>Verdict</th><th>Run</th><th>Subject</th><th>Machine</th>
          <th>Evaluated at ⟨t_text · t_fact⟩</th><th>Recorded</th>
        </tr></thead>
        <tbody id="verdictBody"></tbody>
      </table>
    </div></div>
    <div id="verdictEmpty"></div>
  </section>

  <!-- ============================================================ IMPACT -->
  <section class="view" id="view-impact">
    <div class="impact-form">
      <input class="search" id="iriIn" list="iriList"
             placeholder="Target IRI — which instances transitively reference it?"
             aria-label="Target IRI">
      <datalist id="iriList"></datalist>
      <button class="btn primary" id="runImpact">Trace impact</button>
    </div>
    <div id="impactOut"></div>
  </section>
</main>

<footer>
  Reads only — the console never writes. Evaluation receives its coordinates as
  parameters and never calls the clock <span class="mono">(I8)</span>; the store is
  append-only under a single writer <span class="mono">(I2)</span>.
</footer>

<!-- ============================================================ DETAIL -->
<div class="overlay" id="overlay"></div>
<aside class="drawer" id="drawer" role="dialog" aria-modal="true" aria-labelledby="drawerTitle">
  <div class="drawer-head">
    <div class="top">
      <span id="drawerBadge"></span>
      <button class="close" id="drawerClose" aria-label="Close">×</button>
    </div>
    <h2 id="drawerTitle"></h2>
    <div class="id mono" id="drawerId"></div>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
</aside>

<script>
"use strict";
/* ---------------------------------------------------------------- state */
const S = {
  tt: "",            // RFC3339 or "" = now
  tf: "",
  view: "ledger",
  cFilter: "",       // constructor filter
  q: "",
  offset: 0,
  limit: 60,
  total: 0,
};
const CONS = {
  NRM:{name:"Norm",       role:"directed obligation: bearer owes an act"},
  CLS:{name:"Class",      role:"constitutive classification — counts-as"},
  PWR:{name:"Power",      role:"authority: an exercise extends the store"},
  GRD:{name:"Guard",      role:"defeasible condition, priority, defeat"},
  REF:{name:"Reference",  role:"typed designation across corpora"},
  VAL:{name:"Value",      role:"exact quantitative binding"},
};
const VC = {compliant:"--s-compliant", violated:"--s-violated", conditional:"--s-conditional",
            inapplicable:"--s-inapplicable", defeated:"--s-defeated"};

const $ = (id)=>document.getElementById(id);
const esc = (s)=>String(s??"").replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

function api(path, params={}){
  const u = new URL(path, location.origin);
  if (S.tt) u.searchParams.set("tt", S.tt);
  if (S.tf) u.searchParams.set("tf", S.tf);
  for (const [k,v] of Object.entries(params)) if (v!=="" && v!=null) u.searchParams.set(k,v);
  return fetch(u).then(r=>{
    if (!r.ok) return r.json().then(b=>{throw new Error(b.error||r.statusText)});
    return r.json();
  });
}

/* ------------------------------------------------------------- time fmt */
function fmtInstant(s){          // "2020-01-01 00:00:00+00" | RFC3339 → compact
  if (!s) return "∅";
  const t = s.replace(" ","T").replace(/\+00(:00)?$/,"Z");
  const d = new Date(t);
  if (isNaN(d)) return s;
  return d.toISOString().replace(".000","").replace("T"," ").replace("Z","Z");
}
function fmtRange(r){            // '["2020-01-01 …","infinity")' → 2020-01-01 → ∞
  if (!r) return "∅";
  const m = r.match(/^[\[\(]"?([^",]*)"?,\s*"?([^"\)\]]*)"?[\)\]]$/);
  if (!m) return r;
  const lo = m[1]==="" || m[1].includes("infinity") ? "−∞" : fmtInstant(m[1]).slice(0,10);
  const hi = m[2]==="" || m[2].includes("infinity") ? "∞"  : fmtInstant(m[2]).slice(0,10);
  return lo+" → "+hi;
}
function coordFace(v){ return v ? v.replace("T"," ").replace("Z","Z") : "now"; }

/* --------------------------------------------------- T-expression pretty */
const CMPGLYPH = {"<":"&lt;","<=":"≤","=":"=",">=":"≥",">":"&gt;"};
function fmtExpr(e){
  if (!e) return "";
  switch(e.op){
    case "lit": {
      const l=e.lit||{};
      const v = l.rat ?? l.int ?? l.str ?? l.bool;
      return `<span class="lit">${esc(v)}</span>`;
    }
    case "var":    return `<span class="vr">${esc(e.name)}</span>`;
    case "lookup": return `<span class="fn">reg</span>(#${esc(e.name)})`;
    case "pred":   return `<span class="fn">${esc(e.name)}</span>(${(e.args||[]).map(fmtExpr).join(", ")})`;
    case "not":    return `<span class="op">¬</span>${paren(e.args?.[0])}`;
    case "and":    return (e.args||[]).map(paren).join(' <span class="op">∧</span> ');
    case "or":     return (e.args||[]).map(paren).join(' <span class="op">∨</span> ');
    case "cmp":    return `${fmtExpr(e.args?.[0])} <span class="op">${CMPGLYPH[e.cmp]||esc(e.cmp)}</span> ${fmtExpr(e.args?.[1])}`;
    case "arith":  return `${fmtExpr(e.args?.[0])} <span class="op">${esc(e.arith)}</span> ${fmtExpr(e.args?.[1])}`;
    case "ratio":  return `${paren(e.args?.[0])} <span class="op">∕</span> ${paren(e.args?.[1])}`;
    case "count": {
      const c=e.count||{};
      const w = c.where ? ` <span class="op">where</span> ${fmtExpr(c.where)}` : "";
      return `<span class="fn">count</span>(${esc(c.domain)}${w}) <span class="op">${CMPGLYPH[c.cmp]||esc(c.cmp)}</span> <span class="lit">${esc(c.bound)}</span>`;
    }
    case "window": {
      const w=e.window||{};
      return `<span class="fn">${esc(w.op||"within")}</span>[${esc(w.lower||"")}${w.upper?"…"+esc(w.upper):""}]( ${fmtExpr(w.body)} )`;
    }
    case "boundary":
      return `<span class="ot" title="Open texture — deliberately unresolved; verdicts touching it are conditional">⟨${esc(e.name)} “${esc(e.label)}”⟩</span>`;
    default: return `<span class="muted">${esc(e.op)}</span>`;
  }
}
function paren(e){
  if (!e) return "";
  const inner = fmtExpr(e);
  return ["and","or","cmp","arith"].includes(e.op) ? "("+inner+")" : inner;
}

/* -------------------------------------------------- payload one-liners */
/* Structurally-ingested corpora (docx) carry source text + cue instead of
   named fields — fall back to a text excerpt so the Reading column always
   says something. */
function asObj(v){
  if (v && typeof v === "object") return v;
  try{ return JSON.parse(v) || {}; }catch(_){ return {}; }
}
function excerpt(p){
  if (!p || !p.text) return `<span class="muted">—</span>`;
  const t = String(p.text).replace(/\s+/g," ").trim();
  const cut = t.length>160 ? t.slice(0,160)+"…" : t;
  return `${esc(cut)}${p.cue?` <span class="muted">· cue “${esc(p.cue)}”</span>`:""}`;
}
function summarize(c, p){
  try{
    switch(c){
      case "NRM": {
        if (!p.bearer && !p.act) return excerpt(p);
        const ot = p.qualifier?.op==="boundary" ? " "+fmtExpr(p.qualifier) : "";
        return `<span class="k">${esc(p.bearer)}</span> <span class="muted">owes</span> ${esc(p.act)}${p.target?` <span class="muted">on</span> <span class="k">${esc(p.target)}</span>`:""}${ot} <span class="muted">to</span> <span class="k">${esc(p.counterparty)}</span>`;
      }
      case "CLS":
        if (!p.entity && !p.class_token) return excerpt(p);
        return `<span class="k">${esc(p.entity)}</span> <span class="muted">counts as</span> <span class="k">#${esc(p.class_token)}</span>${p.condition?` <span class="muted">when</span> ${fmtExpr(p.condition)}`:""}`;
      case "GRD": {
        if (!p.condition) return excerpt(p);
        const acts = (p.body||[]).length, defs=(p.defeats||[]).length;
        return `<span class="muted">when</span> ${fmtExpr(p.condition)} <span class="muted">· p=${p.priority??0}${acts?` · activates ${acts}`:""}${defs?` · defeats ${defs}`:""}</span>`;
      }
      case "PWR":
        if (!p.holder && !p.effect) return excerpt(p);
        return `<span class="k">${esc(p.holder)}</span> <span class="muted">may</span> ${esc(p.effect)} <span class="muted">on</span> <span class="k">${esc(p.event)}</span>`;
      case "REF":
        return `<span class="k">${esc(p.source)}</span> <span class="muted">—${esc(p.mode)}→</span> <span class="k">${esc(p.target_iri)}</span>`;
      case "VAL":
        return `${esc(p.function)} <span class="muted">${CMPGLYPH[p.comparator]||esc(p.comparator)}</span> ${p.target?fmtExpr(p.target):""} <span class="muted">(${esc(p.unit)})</span>`;
    }
  }catch(_){/* fall through */}
  return `<span class="muted">—</span>`;
}

/* ---------------------------------------------------------------- census */
function renderCensus(meta){
  const by = Object.fromEntries(meta.by_constructor.map(x=>[x.constructor,x.count]));
  $("census").innerHTML = Object.keys(CONS).map(c=>`
    <button class="tile" style="--tc:var(--c-${c})" data-c="${c}"
            aria-pressed="${S.cFilter===c}">
      <span class="code"><i class="swatch"></i>${c}</span>
      <span class="n">${by[c]??0}</span>
      <div class="role">${CONS[c].role}</div>
    </button>`).join("");
  document.querySelectorAll(".tile").forEach(t=>t.addEventListener("click",()=>{
    S.cFilter = S.cFilter===t.dataset.c ? "" : t.dataset.c;
    S.offset = 0;
    renderCensus(meta); loadLedger();
  }));
  $("dist").innerHTML = Object.keys(CONS)
    .filter(c=>(by[c]??0)>0)
    .map(c=>`<span style="--dc:var(--c-${c}); flex:${by[c]} ${by[c]} 0"
             title="${c} ${by[c]}"></span>`).join("");
  $("asread").innerHTML =
    `as read: <span class="mono">${meta.at_coords}</span> of <span class="mono">${meta.total_rows}</span> rows valid at ⟨<span class="mono">${coordFace(S.tt)}</span> · <span class="mono">${coordFace(S.tf)}</span>⟩`;
}

/* ---------------------------------------------------------------- ledger */
function badge(c){ return `<span class="badge" style="--bc:var(--c-${c})"><i></i>${c}</span>`; }

async function loadLedger(){
  const data = await api("/api/instances", {c:S.cFilter, q:S.q, limit:S.limit, offset:S.offset});
  S.total = data.total;
  $("ledgerBody").innerHTML = data.items.map(it=>{
    const p = asObj(it.payload);
    return `<tr data-id="${it.instance_id}" tabindex="0" role="button"
                aria-label="Open ${it.constructor} at ${esc(it.locus||"unmapped")}">
      <td class="locus" title="${esc(it.locus||"")}">${esc(it.locus||"—")}</td>
      <td>${badge(it.constructor)}</td>
      <td class="sum">${summarize(it.constructor,p)}</td>
      <td class="range">${fmtRange(it.t_text)}</td>
      <td class="range">${fmtRange(it.t_fact)}</td>
    </tr>`;
  }).join("");
  $("ledgerEmpty").innerHTML = data.items.length ? "" : `
    <div class="empty" style="margin-top:12px"><b>Nothing is valid at these coordinates</b>
    Widen the search, clear the constructor filter, or reset the temporal cursor to now.</div>`;
  const page = Math.floor(S.offset/S.limit)+1, pages = Math.max(1, Math.ceil(S.total/S.limit));
  $("pageInfo").textContent = `${page} / ${pages}`;
  $("prevPage").disabled = S.offset<=0;
  $("nextPage").disabled = S.offset+S.limit>=S.total;
  $("ledgerCount").textContent = `${S.total} instance${S.total===1?"":"s"}`;
  document.querySelectorAll("#ledgerBody tr").forEach(tr=>{
    tr.addEventListener("click", ()=>openDetail(tr.dataset.id));
    tr.addEventListener("keydown", e=>{ if(e.key==="Enter") openDetail(tr.dataset.id); });
  });
}

/* ---------------------------------------------------------------- detail */
async function openDetail(id){
  const d = await api("/api/instance", {id});
  const first = d.slices[0];
  if (!first) return;
  const p = asObj(first.payload);
  const c = first.constructor;
  $("drawerBadge").innerHTML = badge(c);
  $("drawerTitle").textContent = first.locus || CONS[c].name;
  $("drawerId").textContent = id;

  const kv = detailKV(c,p);
  const exprs = detailExprs(c,p);
  $("drawerBody").innerHTML = `
    <div class="sect"><h3>Reading</h3><div class="sum" style="max-width:none">${summarize(c,p)}</div></div>
    ${exprs.map(([label,e])=>`
      <div class="sect"><h3>${label}</h3><div class="formula">${fmtExpr(e)}</div></div>`).join("")}
    ${kv.length?`<div class="sect"><h3>Fields</h3><dl class="kv">${
      kv.map(([k,v])=>`<dt>${k}</dt><dd class="mono">${esc(v)}</dd>`).join("")}</dl></div>`:""}
    <div class="sect"><h3>Bitemporal slices — append-only history</h3>
      ${d.slices.map(s=>`
        <div class="slice">
          <div class="coords">t_text <b>${fmtRange(s.t_text)}</b> &nbsp;·&nbsp; t_fact <b>${fmtRange(s.t_fact)}</b></div>
          ${s.locus?`<div class="muted" style="font-size:11px; margin-top:2px">${esc(s.locus)}${s.kind?` <span class="mono">(${esc(s.kind)})</span>`:""}</div>`:""}
        </div>`).join("")}
    </div>
    ${d.refs.length?`<div class="sect"><h3>Designations touching this instance</h3>
      ${d.refs.map(r=>{const rp=asObj(r.payload);
        return `<div class="slice"><div class="sum" style="max-width:none">${summarize("REF",rp)}</div></div>`}).join("")}
    </div>`:""}
    <div class="sect">
      <details class="raw"><summary>Raw payload (JSONB, as stored)</summary>
        <pre>${esc(JSON.stringify(p,null,2))}</pre></details>
    </div>`;
  $("overlay").classList.add("open");
  $("drawer").classList.add("open");
  $("drawerClose").focus();
}
function detailKV(c,p){
  switch(c){
    case "NRM": return [["bearer",p.bearer],["counterparty",p.counterparty],["act",p.act],
                        ["sign",p.sign],["target",p.target]].filter(x=>x[1]);
    case "CLS": return [["entity",p.entity],["class token","#"+p.class_token]];
    case "GRD": return [["priority",p.priority],["activates",(p.body||[]).join(", ")],
                        ["defeats",(p.defeats||[]).join(", ")]].filter(x=>x[1]!==""&&x[1]!=null);
    case "PWR": return [["holder",p.holder],["effect",p.effect],["event",p.event]];
    case "REF": return [["source",p.source],["mode",p.mode],["target IRI",p.target_iri]];
    case "VAL": return [["function",p.function],["unit",p.unit],["comparator",p.comparator]];
  }
  return [];
}
function detailExprs(c,p){
  const out=[];
  if (c==="CLS" && p.condition) out.push(["Condition — counts-as when", p.condition]);
  if (c==="GRD" && p.condition) out.push(["Guard condition", p.condition]);
  if (c==="NRM" && p.qualifier) out.push(["Qualifier", p.qualifier]);
  if (c==="VAL"){
    if (p.measure) out.push(["Measure", p.measure]);
    if (p.target)  out.push(["Target", p.target]);
  }
  if (c==="PWR" && p.operand_schema) out.push(["Operand schema", p.operand_schema]);
  return out;
}
function closeDetail(){
  $("overlay").classList.remove("open");
  $("drawer").classList.remove("open");
}
$("overlay").addEventListener("click", closeDetail);
$("drawerClose").addEventListener("click", closeDetail);
document.addEventListener("keydown", e=>{ if(e.key==="Escape"){closeDetail(); toggleCursor(false);} });

/* ---------------------------------------------------------------- verdicts */
async function loadVerdicts(){
  const d = await api("/api/verdicts");
  $("verdictBody").innerHTML = d.items.map(v=>`
    <tr data-id="${v.subject}" tabindex="0" role="button">
      <td><span class="chip" style="--vc:var(${VC[v.result]||"--ink-2"})"><i></i>${esc(v.result)}</span>
          ${v.conditional_on?` <span class="ot">${esc(v.conditional_on)}</span>`:""}</td>
      <td class="mono" style="font-size:11.5px">${esc(v.run)}</td>
      <td class="mono" style="font-size:11px">${esc(v.subject.slice(0,8))}…</td>
      <td class="mono" style="font-size:11.5px">${esc(v.machine_state||"—")}</td>
      <td class="range">⟨${fmtInstant(v.eval_t_text).slice(0,10)} · ${fmtInstant(v.eval_t_fact).slice(0,10)}⟩</td>
      <td class="range">${fmtInstant(v.recorded_at).slice(0,16)}</td>
    </tr>`).join("");
  $("verdictEmpty").innerHTML = d.items.length ? "" : `
    <div class="empty" style="margin-top:12px"><b>No verdicts persisted yet</b>
    Run <span class="mono">make replay-d8</span> to replay the benchmark traces through Ê.</div>`;
  document.querySelectorAll("#verdictBody tr").forEach(tr=>{
    tr.addEventListener("click", ()=>openDetail(tr.dataset.id));
    tr.addEventListener("keydown", e=>{ if(e.key==="Enter") openDetail(tr.dataset.id); });
  });
}

/* ---------------------------------------------------------------- impact */
async function loadIris(){
  const d = await api("/api/iris");
  $("iriList").innerHTML = d.iris.map(i=>`<option value="${esc(i)}">`).join("");
}
async function runImpact(){
  const iri = $("iriIn").value.trim();
  if (!iri){ $("iriIn").focus(); return; }
  const d = await api("/api/impact", {iri});
  if (!d.nodes.length){
    $("impactOut").innerHTML = `<div class="empty"><b>Nothing references this IRI at the read coordinates</b>
      Pick a target from the suggestions, or move the temporal cursor.</div>`;
    return;
  }
  const byDepth = {};
  d.nodes.forEach(n=>{ (byDepth[n.Depth] ??= []).push(n.IRI); });
  $("impactOut").innerHTML = Object.keys(byDepth).sort((a,b)=>a-b).map(depth=>`
    <div class="depth-group">
      <div class="depth-label">depth ${depth} — ${depth==1?"references the target directly":"references something impacted"}</div>
      ${byDepth[depth].map(iri=>`<div class="iri-item">${esc(iri)}</div>`).join("")}
    </div>`).join("");
}
$("runImpact").addEventListener("click", runImpact);
$("iriIn").addEventListener("keydown", e=>{ if(e.key==="Enter") runImpact(); });

/* ---------------------------------------------------------------- cursor */
function toggleCursor(open){
  const pop = $("cursorPop");
  const want = open ?? !pop.classList.contains("open");
  pop.classList.toggle("open", want);
  $("cursorFace").setAttribute("aria-expanded", String(want));
}
$("cursorFace").addEventListener("click", ()=>toggleCursor());
$("applyCoords").addEventListener("click", ()=>{
  S.tt = $("ttIn").value ? new Date($("ttIn").value).toISOString().replace(/\.\d{3}Z$/,"Z") : "";
  S.tf = $("tfIn").value ? new Date($("tfIn").value).toISOString().replace(/\.\d{3}Z$/,"Z") : "";
  toggleCursor(false); refreshAll();
});
$("resetCoords").addEventListener("click", ()=>{
  S.tt = S.tf = ""; $("ttIn").value = $("tfIn").value = "";
  toggleCursor(false); refreshAll();
});
function renderCursorFace(){
  $("ttFace").textContent = coordFace(S.tt);
  $("tfFace").textContent = coordFace(S.tf);
}

/* ---------------------------------------------------------------- nav */
document.querySelectorAll("nav button").forEach(b=>b.addEventListener("click", ()=>{
  S.view = b.dataset.view;
  document.querySelectorAll("nav button").forEach(x=>x.setAttribute("aria-current", String(x===b)));
  document.querySelectorAll(".view").forEach(v=>v.classList.toggle("active", v.id==="view-"+S.view));
  if (S.view==="verdicts") loadVerdicts();
  if (S.view==="impact") loadIris();
}));

/* ---------------------------------------------------------------- search */
let qTimer;
$("q").addEventListener("input", ()=>{
  clearTimeout(qTimer);
  qTimer = setTimeout(()=>{ S.q = $("q").value.trim(); S.offset=0; loadLedger(); }, 220);
});
$("prevPage").addEventListener("click", ()=>{ S.offset=Math.max(0,S.offset-S.limit); loadLedger(); });
$("nextPage").addEventListener("click", ()=>{ S.offset+=S.limit; loadLedger(); });

/* ---------------------------------------------------------------- boot */
async function refreshAll(){
  renderCursorFace();
  try{
    const meta = await api("/api/meta");
    renderCensus(meta);
    await loadLedger();
    if (S.view==="verdicts") await loadVerdicts();
    if (S.view==="impact") await loadIris();
  }catch(err){
    $("ledgerEmpty").innerHTML = `<div class="empty" style="margin-top:12px">
      <b>Cannot read the store</b> ${esc(err.message)} — is the db service up
      (<span class="mono">docker compose up -d db</span>)?</div>`;
  }
}
refreshAll();
</script>
